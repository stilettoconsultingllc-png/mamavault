<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MamaVault Prototype v2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-wrap">
      <section class="hero">
        <p class="version-label">MamaVault Prototype v2</p>
        <h1>MamaVault: Everything Important About Your Child, Safe in One Place</h1>
        <p>
          A warm family-safety dashboard to organize child records in one trusted space.
          Prototype view using mock data only.
        </p>
        <div class="hero-actions">
          <button class="primary-button">Add Child</button>
          <button class="secondary-button">Upload Document</button>
          <button class="secondary-button">Create Safety Packet</button>
          <button class="secondary-button">View Doctor’s Hub</button>
        </div>
      </section>

      <section class="dashboard-area">
        <h2>Family Safety Dashboard</h2>
        <div id="dashboardCards" class="dashboard-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
